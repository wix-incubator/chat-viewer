name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version to publish: optional leading v, MAJOR.MINOR.PATCH with optional prerelease/build metadata, for example 0.2.1, v0.2.1, or 0.2.1-beta.1'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    env:
      HUSKY: 0

    steps:
      - name: Verify release branch
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "Release workflow must be run from master." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: yarn
          registry-url: 'https://registry.npmjs.org'

      - name: Set release version
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_VERSION#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must be v-prefixed or exact semver, for example v0.2.1 or 0.2.1." >&2
            exit 1
          fi

          yarn version "$VERSION" --immediate

      - name: Install dependencies
        run: NPQ_PKG_MGR=yarn npx npq install
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run linter
        run: yarn lint

      - name: Check formatting
        run: yarn format:check

      - name: Build package
        run: yarn build:lib

      - name: Publish package
        run: npm publish
