name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Exact version to publish, for example 0.1.6'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    env:
      HUSKY: 0

    steps:
      - name: Verify release branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "Release workflow must be run from master." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Set release version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must be an exact semver value, for example 0.1.6." >&2
            exit 1
          fi

          npm version "$VERSION" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build package
        run: npm run build:lib

      - name: Publish package
        run: npm publish
